<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Sample Web Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f4f4;
    }
    header {
      background-color: #4CAF50;
      color: white;
      padding: 20px;
      text-align: center;
    }
    nav {
      display: flex;
      justify-content: center;
      background-color: #333;
    }
    nav a {
      color: white;
      padding: 14px 20px;
      text-decoration: none;
      text-align: center;
    }
    nav a:hover {
      background-color: #ddd;
      color: black;
    }
    main {
      padding: 20px;
    }
    section {
      background-color: white;
      margin: 20px 0;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    button {
      padding: 10px 20px;
      background-color: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 4px;
    }
    button:hover {
      background-color: #45a049;
    }
  </style>
</head>
<body>

  <header>
    <h1>Welcome to My Sample Page</h1>
  </header>

  <nav>
    <a href="#about">About</a>
    <a href="#services">Services</a>
    <a href="#contact">Contact</a>
  </nav>

  <main>
    <section id="about">
      <h2>About Us</h2>
      <p>This is a sample web page demonstrating HTML, CSS, and basic JavaScript.</p>
    </section>

    <section id="services">
      <h2>Our Services</h2>
      <ul>
        <li>Web Development</li>
        <li>App Development</li>
        <li>Cloud Solutions</li>
      </ul>
    </section>

    <section id="contact">
      <h2>Contact Us</h2>
      <p>Click the button to see a message:</p>
      <button onclick="showMessage()">Say Hello</button>
      <p id="message" style="margin-top: 10px; font-weight: bold;"></p>
    </section>
  </main>

  <script>
    function showMessage() {
      document.getElementById('message').innerText = "Hello! Thanks for visiting!";
    }
  </script>

</body>
</html>
